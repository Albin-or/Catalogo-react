<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Fondo de la tarjeta -->
  <rect width="100%" height="100%" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Icono de advertencia centrado -->
  <g transform="translate(168, 70)">
    <!-- Círculo rojo claro de fondo -->
    <circle cx="32" cy="32" r="32" fill="#FEE2E2"/>
    
    <!-- Triángulo de advertencia -->
    <path d="M32 14 L54 50 A 3 3 0 0 1 51.4 54.5 L12.6 54.5 A 3 3 0 0 1 10 50 Z" fill="none" stroke="#EF4444" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Signo de exclamación interno -->
    <line x1="32" y1="26" x2="32" y2="40" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="32" cy="47" r="2" fill="#EF4444"/>
  </g>
  
  <!-- Textos con tipografía estándar compatible -->
  <text x="200" y="185" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">
    Imagen no disponible
  </text>
  
  <text x="200" y="210" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">
    No se pudo cargar el recurso
  </text>
</svg>
